<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Synspera</title>
    <script>
      // CanvasKit's emscripten glue references require('fs')/require('path') in
      // its Node code path; return empty objects for those (the browser path
      // loads the WASM via fetch/locateFile, so they're never used).
      //
      // Everything else MUST throw: e.g. @react-navigation does
      // `try { require('react-native-screens') } catch {}` and falls back to
      // plain Views only when the require throws. Returning {} there would make
      // it render an undefined <Screens.ScreenContainer> and crash.
      window.require = window.require || function (m) {
        if (m === 'fs' || m === 'path') return {};
        throw new Error('require(' + m + ') is not available in the browser');
      };
    </script>
    <style>
      html, body { height: 100%; margin: 0; }
      /* Dark "frame" around the app on wide screens */
      body {
        background: #060509;
        display: flex;
        justify-content: center;
      }
      /* The RN app mounts into #root. Constrain to a phone-width column so the
         mobile layout looks right on desktop, full-width on actual phones. */
      #root {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 440px;
        height: 100vh;
        height: 100dvh;
        background: #100E15;
        overflow: hidden;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.55);
      }
      /* Loading veil shown until Skia's CanvasKit WASM resolves */
      #boot {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; background: #100E15; z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #boot.hide { opacity: 0; }
      #bootlogo {
        width: 260px; max-width: 72%; height: auto;
        opacity: 0;
        animation: logoIn 1.3s cubic-bezier(0.2, 0.7, 0.2, 1) forwards,
                   logoGlow 2.6s ease-in-out 1.1s infinite;
      }
      @keyframes logoIn {
        0%   { opacity: 0; transform: translateY(10px) scale(0.92); filter: blur(6px); }
        60%  { opacity: 1; }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      @keyframes logoGlow {
        0%, 100% { filter: drop-shadow(0 0 0 rgba(217, 180, 90, 0)); }
        50%      { filter: drop-shadow(0 0 14px rgba(217, 180, 90, 0.35)); }
      }
    </style>
    <script type="module" crossorigin src="/synspera-demo/assets/index-BEpvF7__.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot"><img id="bootlogo" src="./wordmark.png" alt="Synspera" /></div>
  </body>
</html>
